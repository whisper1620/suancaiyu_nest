<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 酸菜鱼的小窝</title>
    <style>
        body{font-family:微软雅黑;background:#f5f7fa;padding:40px;}
        .box{max-width:600px;margin:0 auto;background:white;padding:30px;border-radius:12px;box-shadow:0 2px 10px #00000015;}
        h2{text-align:center;margin-bottom:20px;color:#409eff;}
        .upload{border:2px dashed #ccc;border-radius:8px;padding:40px;text-align:center;margin:20px 0;}
        button{padding:10px 25px;background:#409eff;color:white;border:none;border-radius:6px;cursor:pointer;}
        .back{display:block;text-align:center;margin-top:20px;color:#666;text-decoration:none;}
    </style>
</head>
<body>
    <div class="box">
        <h2>后台文件上传管理</h2>
        <div class="upload">
            <p>可上传图片、视频、文档任意文件</p>
            <br>
            <input type="file" multiple>
        </div>
        <p>提示：上传后自动分类展示在首页对应板块</p>
        <a href="index.html" class="back">← 返回小窝首页</a>
    </div>
</body>
</html>
